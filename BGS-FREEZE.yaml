freeze_id: BGS-FREEZE-PREPUBLIC-2026-03-22-A
status: active
phase: pre-public
applies_until: first public BGS release or explicit supersession
purpose: >
  Freeze version numbering and published identifier reuse while the BGS
  suite layer is still private or draft and may continue to evolve.

numbering_scope:
  - suite-layer version labels
  - freeze identifiers
  - published composition identifiers

rules:
  - Published numbering identifiers must not be renumbered or reused.
  - New identifiers may be added, but previously published identifiers remain stable.
  - BGS suite-layer docs may continue to evolve during the private or draft phase.
  - Claims and examples must still pin their own immutable refs explicitly.
  - The freeze record does not define a default composition baseline for claims.

notes:
  - The suite layer remains under active drafting.
  - This freeze preserves numbering stability before public release.
